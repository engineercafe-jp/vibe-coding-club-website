<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- Neon Glow Filters -->
    <filter id="neonGlowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Gauge Gradient -->
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/> <!-- Red -->
      <stop offset="40%" stop-color="#f59e0b"/> <!-- Yellow -->
      <stop offset="85%" stop-color="#10b981"/> <!-- Emerald -->
      <stop offset="100%" stop-color="#06b6d4"/> <!-- Cyan -->
    </linearGradient>

    <!-- Database Cylinder Gradient -->
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4b5563"/>
      <stop offset="50%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="dbTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#4b5563"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle network nodes linking in background -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1.5">
    <line x1="100" y1="100" x2="250" y2="180"/>
    <line x1="250" y1="180" x2="150" y2="350"/>
    <line x1="150" y1="350" x2="400" y2="280"/>
    <line x1="400" y1="280" x2="350" y2="120"/>
    <line x1="350" y1="120" x2="600" y2="80"/>
    <line x1="600" y1="80" x2="650" y2="280"/>
    <line x1="650" y1="280" x2="520" y2="400"/>
    <line x1="520" y1="400" x2="680" y2="520"/>
    <line x1="400" y1="280" x2="520" y2="400"/>
    
    <circle cx="100" cy="100" r="4" fill="#ffffff"/>
    <circle cx="250" cy="180" r="5" fill="#ffffff"/>
    <circle cx="150" cy="350" r="4" fill="#ffffff"/>
    <circle cx="400" cy="280" r="6" fill="#ffffff"/>
    <circle cx="350" cy="120" r="4" fill="#ffffff"/>
    <circle cx="600" cy="80" r="5" fill="#ffffff"/>
    <circle cx="650" cy="280" r="4" fill="#ffffff"/>
    <circle cx="520" cy="400" r="6" fill="#ffffff"/>
    <circle cx="680" cy="520" r="5" fill="#ffffff"/>
  </g>

  <!-- Left Side: Connection Speedometer/Gauge -->
  <g transform="translate(200, 300)" filter="url(#shadow)">
    <!-- Outer rim -->
    <circle cx="0" cy="0" r="140" fill="#1e293b" opacity="0.4" stroke="#334155" stroke-width="3"/>
    
    <!-- Gauge Arc -->
    <path d="M -100,50 A 110,110 0 1,1 100,50" fill="none" stroke="url(#gaugeGrad)" stroke-width="20" stroke-linecap="round"/>
    
    <!-- Ticks -->
    <g stroke="#ffffff" stroke-width="2" opacity="0.3">
      <line x1="-120" y1="0" x2="-105" y2="0" />
      <line x1="-85" y1="-85" x2="-74" y2="-74" />
      <line x1="0" y1="-120" x2="0" y2="-105" />
      <line x1="85" y1="-85" x2="74" y2="-74" />
      <line x1="120" y1="0" x2="105" y2="0" />
    </g>

    <!-- Speed Pointer Needle -->
    <g transform="rotate(75)">
      <polygon points="-8,0 0,-115 8,0" fill="#22d3ee" filter="url(#neonGlowCyan)"/>
      <circle cx="0" cy="0" r="15" fill="#0f172a" stroke="#22d3ee" stroke-width="4" filter="url(#neonGlowCyan)"/>
    </g>

    <!-- Glowing speed indicators under needle -->
    <path d="M 40,40 Q 55,20 70,30" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" filter="url(#neonGlowCyan)"/>
    <path d="M -70,30 Q -55,20 -40,40" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" filter="url(#neonGlowOrange)"/>
  </g>

  <!-- Right Side: Periodic Weekday/Hour Heatmap Grid -->
  <g transform="translate(420, 150)" filter="url(#shadow)">
    <!-- Panel Background -->
    <rect x="0" y="0" width="310" height="300" rx="16" fill="#1e293b" fill-opacity="0.6" stroke="#334155" stroke-width="2"/>
    
    <!-- Heatmap Grid Title line placeholder -->
    <rect x="20" y="20" width="100" height="10" rx="5" fill="#64748b"/>
    <rect x="20" y="38" width="60" height="6" rx="3" fill="#475569"/>

    <!-- Heatmap Cells Layout -->
    <g transform="translate(20, 60)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="35" height="20" rx="3" fill="#10b981" filter="url(#neonGlowGreen)" opacity="0.9"/>
      <rect x="40" y="0" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="80" y="0" width="35" height="20" rx="3" fill="#06b6d4" filter="url(#neonGlowCyan)"/>
      <rect x="120" y="0" width="35" height="20" rx="3" fill="#0891b2"/>
      <rect x="160" y="0" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="200" y="0" width="35" height="20" rx="3" fill="#f59e0b"/>
      <rect x="240" y="0" width="35" height="20" rx="3" fill="#b91c1c"/>

      <!-- Row 2 -->
      <rect x="0" y="25" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="40" y="25" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="80" y="25" width="35" height="20" rx="3" fill="#0891b2"/>
      <rect x="120" y="25" width="35" height="20" rx="3" fill="#06b6d4"/>
      <rect x="160" y="25" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="200" y="25" width="35" height="20" rx="3" fill="#ea580c" filter="url(#neonGlowOrange)"/>
      <rect x="240" y="25" width="35" height="20" rx="3" fill="#ef4444"/>

      <!-- Row 3 -->
      <rect x="0" y="50" width="35" height="20" rx="3" fill="#06b6d4"/>
      <rect x="40" y="50" width="35" height="20" rx="3" fill="#0891b2"/>
      <rect x="80" y="50" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="120" y="50" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="160" y="50" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="200" y="50" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="240" y="50" width="35" height="20" rx="3" fill="#f59e0b"/>

      <!-- Row 4 -->
      <rect x="0" y="75" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="40" y="75" width="35" height="20" rx="3" fill="#06b6d4"/>
      <rect x="80" y="75" width="35" height="20" rx="3" fill="#0891b2"/>
      <rect x="120" y="75" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="160" y="75" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="200" y="75" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="240" y="75" width="35" height="20" rx="3" fill="#0891b2"/>

      <!-- Row 5 -->
      <rect x="0" y="100" width="35" height="20" rx="3" fill="#ef4444"/>
      <rect x="40" y="100" width="35" height="20" rx="3" fill="#f59e0b"/>
      <rect x="80" y="100" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="120" y="100" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="160" y="100" width="35" height="20" rx="3" fill="#06b6d4"/>
      <rect x="200" y="100" width="35" height="20" rx="3" fill="#0891b2"/>
      <rect x="240" y="100" width="35" height="20" rx="3" fill="#10b981"/>

      <!-- Row 6 -->
      <rect x="0" y="125" width="35" height="20" rx="3" fill="#b91c1c"/>
      <rect x="40" y="125" width="35" height="20" rx="3" fill="#ea580c"/>
      <rect x="80" y="125" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="120" y="125" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="160" y="125" width="35" height="20" rx="3" fill="#0891b2"/>
      <rect x="200" y="125" width="35" height="20" rx="3" fill="#06b6d4"/>
      <rect x="240" y="125" width="35" height="20" rx="3" fill="#059669"/>

      <!-- Row 7 -->
      <rect x="0" y="150" width="35" height="20" rx="3" fill="#0891b2"/>
      <rect x="40" y="150" width="35" height="20" rx="3" fill="#06b6d4"/>
      <rect x="80" y="150" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="120" y="150" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="160" y="150" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="200" y="150" width="35" height="20" rx="3" fill="#ef4444"/>
      <rect x="240" y="150" width="35" height="20" rx="3" fill="#b91c1c"/>

      <!-- Row 8 -->
      <rect x="0" y="175" width="35" height="20" rx="3" fill="#059669"/>
      <rect x="40" y="175" width="35" height="20" rx="3" fill="#10b981"/>
      <rect x="80" y="175" width="35" height="20" rx="3" fill="#06b6d4"/>
      <rect x="120" y="175" width="35" height="20" rx="3" fill="#0891b2"/>
      <rect x="160" y="175" width="35" height="20" rx="3" fill="#f59e0b"/>
      <rect x="200" y="175" width="35" height="20" rx="3" fill="#ea580c"/>
      <rect x="240" y="175" width="35" height="20" rx="3" fill="#ef4444"/>

      <!-- Row 9 -->
      <rect x="0" y="200" width="35" height="20" rx="3" fill="#334155" opacity="0.5"/>
      <rect x="40" y="200" width="35" height="20" rx="3" fill="#334155" opacity="0.5"/>
      <rect x="80" y="200" width="35" height="20" rx="3" fill="#334155" opacity="0.5"/>
      <rect x="120" y="200" width="35" height="20" rx="3" fill="#334155" opacity="0.5"/>
      <rect x="160" y="200" width="35" height="20" rx="3" fill="#334155" opacity="0.5"/>
      <rect x="200" y="200" width="35" height="20" rx="3" fill="#334155" opacity="0.5"/>
      <rect x="240" y="200" width="35" height="20" rx="3" fill="#334155" opacity="0.5"/>
    </g>
  </g>

  <!-- Bottom Panel: 24h Trend Chart and Database SQLite storage -->
  <g transform="translate(100, 470)" filter="url(#shadow)">
    <!-- SQLite Database Cylinder -->
    <g transform="translate(520, -10)">
      <path d="M 0,20 L 0,80 A 40,15 0 0,0 80,80 L 80,20 Z" fill="url(#dbGrad)" stroke="#374151" stroke-width="2"/>
      <ellipse cx="40" cy="20" rx="40" ry="15" fill="url(#dbTopGrad)" stroke="#374151" stroke-width="2"/>
      <ellipse cx="40" cy="40" rx="40" ry="15" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="3,3"/>
      <ellipse cx="40" cy="60" rx="40" ry="15" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="3,3"/>
      <circle cx="40" cy="20" r="4" fill="#06b6d4" filter="url(#neonGlowCyan)"/>
    </g>

    <!-- 24h Speed Trend Graph -->
    <rect x="0" y="0" width="480" height="90" rx="12" fill="#1e293b" fill-opacity="0.6" stroke="#334155" stroke-width="1.5"/>
    
    <!-- Gridlines for chart -->
    <line x1="10" y1="22" x2="470" y2="22" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <line x1="10" y1="45" x2="470" y2="45" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <line x1="10" y1="67" x2="470" y2="67" stroke="#475569" stroke-width="1" opacity="0.3"/>

    <!-- Trend lines -->
    <path d="M 20,70 L 60,60 L 100,20 L 140,30 L 180,75 L 220,50 L 260,15 L 300,10 L 340,35 L 380,40 L 420,80 L 460,55" fill="none" stroke="#06b6d4" stroke-width="3" filter="url(#neonGlowCyan)"/>
    <path d="M 20,80 L 60,75 L 100,45 L 140,50 L 180,82 L 220,68 L 260,35 L 300,30 L 340,55 L 380,52 L 420,85 L 460,70" fill="none" stroke="#10b981" stroke-width="2"/>
    <path d="M 20,25 L 60,30 L 100,60 L 140,55 L 180,20 L 220,35 L 260,75 L 300,80 L 340,40 L 380,45 L 420,15 L 460,25" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2,2"/>
  </g>

  <!-- Cron scheduling clock indicator -->
  <g transform="translate(100, 150)" filter="url(#shadow)" opacity="0.85">
    <circle cx="0" cy="0" r="30" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#eab308" stroke-width="1.5" stroke-dasharray="2,2"/>
    <line x1="0" y1="0" x2="0" y2="-18" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="15" y2="0" stroke="#eab308" stroke-width="2" stroke-linecap="round" filter="url(#neonGlowOrange)"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff"/>
  </g>
</svg>
