<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Radial Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#2c1a3b"/>
      <stop offset="60%" stop-color="#120c1e"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>

    <!-- Glowing Filters -->
    <filter id="neonGlowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="12" flood-color="#000000" flood-opacity="0.7"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="gpuMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="50%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="goldLuster" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="colabOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="circuitGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle grid layout in background -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- Classical Japanese elements at borders -->
  <g opacity="0.12" fill="url(#goldLuster)">
    <path d="M -20,80 Q 40,60 80,90 T 160,80 T 240,110 L 240,120 T 160,100 T -20,100 Z" />
    <path d="M 580,500 Q 640,480 680,510 T 760,500 T 820,530 L 820,545 T 760,520 T 580,520 Z" />
  </g>

  <!-- pyngrok API Gateway / Tunnel representation -->
  <g transform="translate(100, 300)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="60" ry="100" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,4"/>
    <ellipse cx="0" cy="0" rx="40" ry="70" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.5" filter="url(#neonGlowCyan)"/>
    <ellipse cx="0" cy="0" rx="20" ry="35" fill="#0e7490" opacity="0.8" stroke="#22d3ee" stroke-width="1"/>
    
    <!-- Data packets coming from tunnel -->
    <path d="M 0,-10 Q 80,-40 180,-20" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5,5" filter="url(#neonGlowCyan)"/>
    <path d="M 0,10 Q 80,40 180,20" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5,5" filter="url(#neonGlowCyan)"/>
    <circle cx="100" cy="-22" r="4" fill="#22d3ee" filter="url(#neonGlowCyan)"/>
    <circle cx="130" cy="23" r="3" fill="#22d3ee"/>
  </g>

  <!-- Hugging Face / Google Drive Cloud representation -->
  <g transform="translate(400, 100)" opacity="0.45">
    <path d="M -150,-10 C -170,-10 -180,10 -160,20 C -180,30 -150,50 -130,40 C -120,50 -90,50 -80,40 C -60,45 -50,25 -65,15 C -55,-5 -85,-15 -100,-5 C -110,-15 -140,-15 -150,-10 Z" fill="none" stroke="#fb923c" stroke-width="2" filter="url(#neonGlowOrange)"/>
    <path d="M 100,10 C 85,5 75,25 90,35 C 75,45 105,65 125,55 C 135,65 165,65 175,55 C 195,60 205,40 190,30 C 200,10 170,0 155,10 C 145,0 115,0 100,10 Z" fill="none" stroke="#38bdf8" stroke-width="2" filter="url(#neonGlowCyan)"/>
    <!-- Connection lines down to GPU -->
    <line x1="-120" y1="45" x2="-20" y2="150" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="140" y1="60" x2="60" y2="150" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,4"/>
  </g>

  <!-- GPU Unit (NVIDIA T4 conceptual model) -->
  <g transform="translate(300, 190)" filter="url(#shadow)">
    <!-- Base Card Board -->
    <rect x="0" y="0" width="320" height="200" rx="10" fill="url(#gpuMetal)" stroke="#374151" stroke-width="2"/>
    
    <!-- PCIe gold fingers -->
    <rect x="40" y="200" width="240" height="8" fill="url(#goldLuster)"/>
    <path d="M 40,200 L 40,208 M 50,200 L 50,208 M 60,200 L 60,208 M 70,200 L 70,208 M 80,200 L 80,208 M 90,200 L 90,208 M 100,200 L 100,208 M 110,200 L 110,208 M 120,200 L 120,208 M 130,200 L 130,208 M 140,200 L 140,208 M 150,200 L 150,208 M 160,200 L 160,208 M 170,200 L 170,208 M 180,200 L 180,208 M 190,200 L 190,208 M 200,200 L 200,208 M 210,200 L 210,208 M 220,200 L 220,208 M 230,200 L 230,208 M 240,200 L 240,208 M 250,200 L 250,208 M 260,200 L 260,208 M 270,200 L 270,208 M 280,200 L 280,208" stroke="#fbbf24" stroke-width="1.5"/>

    <!-- Heatsink Fins -->
    <g opacity="0.3" stroke="#9ca3af" stroke-width="2">
      <line x1="20" y1="30" x2="180" y2="30" />
      <line x1="20" y1="40" x2="180" y2="40" />
      <line x1="20" y1="50" x2="180" y2="50" />
      <line x1="20" y1="60" x2="180" y2="60" />
      <line x1="20" y1="70" x2="180" y2="70" />
      <line x1="20" y1="80" x2="180" y2="80" />
      <line x1="20" y1="90" x2="180" y2="90" />
      <line x1="20" y1="100" x2="180" y2="100" />
      <line x1="20" y1="110" x2="180" y2="110" />
      <line x1="20" y1="120" x2="180" y2="120" />
      <line x1="20" y1="130" x2="180" y2="130" />
      <line x1="20" y1="140" x2="180" y2="140" />
      <line x1="20" y1="150" x2="180" y2="150" />
      <line x1="20" y1="160" x2="180" y2="160" />
      <line x1="20" y1="170" x2="180" y2="170" />
    </g>

    <!-- GPU Core chip -->
    <rect x="200" y="45" width="90" height="90" rx="8" fill="#111827" stroke="#4b5563" stroke-width="3"/>
    <rect x="210" y="55" width="70" height="70" rx="4" fill="url(#colabOrange)" opacity="0.15" filter="url(#neonGlowOrange)"/>
    <rect x="225" y="70" width="40" height="40" rx="2" fill="none" stroke="url(#circuitGold)" stroke-width="2" filter="url(#neonGlowOrange)"/>
    <path d="M 245,80 Q 245,90 235,90 Q 245,90 245,100 Q 245,90 255,90 Q 245,90 245,80 Z" fill="#fb923c" filter="url(#neonGlowOrange)"/>

    <!-- Circuit traces -->
    <path d="M 60,195 L 60,160 Q 80,120 200,110" fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.6"/>
    <path d="M 120,195 L 120,170 Q 140,135 200,120" fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.6"/>
    <path d="M 180,195 L 180,180 Q 190,150 200,130" fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.6"/>

    <!-- Status LEDs -->
    <circle cx="15" cy="15" r="3" fill="#22c55e" filter="url(#neonGlowCyan)"/>
    <circle cx="25" cy="15" r="3" fill="#eab308" filter="url(#neonGlowOrange)"/>
    <circle cx="35" cy="15" r="3" fill="#3b82f6"/>
  </g>

  <!-- Llama Quantization weights nodes -->
  <g transform="translate(380, 430)">
    <g opacity="0.8">
      <!-- Unloaded layers -->
      <rect x="-100" y="10" width="70" height="16" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <rect x="-100" y="32" width="70" height="16" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <rect x="-100" y="54" width="70" height="16" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>

      <circle cx="-85" cy="18" r="3" fill="#475569"/><circle cx="-65" cy="18" r="3" fill="#475569"/><circle cx="-45" cy="18" r="3" fill="#475569"/>
      <circle cx="-85" cy="40" r="3" fill="#475569"/><circle cx="-65" cy="40" r="3" fill="#475569"/><circle cx="-45" cy="40" r="3" fill="#475569"/>
      
      <!-- GPU Offloaded active layers -->
      <rect x="-10" y="10" width="70" height="16" rx="4" fill="#431407" stroke="#ea580c" stroke-width="1.5" filter="url(#neonGlowOrange)"/>
      <rect x="-10" y="32" width="70" height="16" rx="4" fill="#431407" stroke="#ea580c" stroke-width="1.5" filter="url(#neonGlowOrange)"/>
      <rect x="-10" y="54" width="70" height="16" rx="4" fill="#431407" stroke="#ea580c" stroke-width="1.5" filter="url(#neonGlowOrange)"/>

      <circle cx="5" cy="18" r="3" fill="#f97316"/><circle cx="25" cy="18" r="3" fill="#f97316"/><circle cx="45" cy="18" r="3" fill="#f97316"/>
      <circle cx="5" cy="40" r="3" fill="#f97316"/><circle cx="25" cy="40" r="3" fill="#f97316"/><circle cx="45" cy="40" r="3" fill="#f97316"/>
      <circle cx="5" cy="62" r="3" fill="#f97316"/><circle cx="25" cy="62" r="3" fill="#f97316"/><circle cx="45" cy="62" r="3" fill="#f97316"/>

      <!-- Arrows showing offloading -->
      <path d="M -25,18 L -15,18" stroke="#fb923c" stroke-width="1.5" fill="none"/>
      <path d="M -20,14 L -15,18 L -20,22" stroke="#fb923c" stroke-width="1.5" fill="none"/>

      <path d="M -25,40 L -15,40" stroke="#fb923c" stroke-width="1.5" fill="none"/>
      <path d="M -20,36 L -15,40 L -20,44" stroke="#fb923c" stroke-width="1.5" fill="none"/>
      
      <!-- Connection up to GPU -->
      <path d="M 25,10 Q 50,-60 120,-150" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
    </g>
  </g>

  <!-- Llama animal icon/logo representation -->
  <g transform="translate(620, 390)" filter="url(#shadow)" opacity="0.85">
    <polygon points="50,0 93,25 93,75 50,100 7,75 7,25" fill="#1e1b4b" stroke="#818cf8" stroke-width="2" filter="url(#neonGlowCyan)"/>
    <polygon points="45,25 50,15 52,25" fill="#c084fc"/>
    <polygon points="55,25 60,15 62,25" fill="#c084fc"/>
    <polygon points="45,28 65,28 68,38 65,48 45,48" fill="#a78bfa"/>
    <polygon points="45,48 55,48 55,65 48,65" fill="#e9d5ff"/>
    <polygon points="45,48 65,48 68,80 40,80" fill="#818cf8"/>
  </g>

  <!-- Connection line between GPU core and Llama Weights model node -->
  <path d="M 500,240 Q 600,230 670,390" fill="none" stroke="#818cf8" stroke-width="2" stroke-dasharray="4,4" filter="url(#neonGlowCyan)"/>

  <!-- Falling cherry blossom petals -->
  <g opacity="0.75">
    <path d="M 240,490 C 235,490 230,495 233,500 C 236,505 244,505 245,500 C 246,495 245,490 240,490 Z" fill="#fda4af" transform="rotate(15 240 490)"/>
    <path d="M 520,470 C 515,470 510,475 513,480 C 516,485 524,485 525,480 C 526,475 525,470 520,470 Z" fill="#fda4af" transform="rotate(-30 520 470)"/>
    <path d="M 640,150 C 635,150 630,155 633,160 C 636,165 644,165 645,160 C 646,155 645,150 640,150 Z" fill="#fda4af" transform="rotate(10 640 150)"/>
  </g>
</svg>
