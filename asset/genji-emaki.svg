<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#1f1a4a"/>
      <stop offset="60%" stop-color="#0e0a24"/>
      <stop offset="100%" stop-color="#04020a"/>
    </radialGradient>
    
    <!-- Neon Glow Filters -->
    <filter id="neonGlowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    
    <!-- Gradients for Scroll -->
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="50%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#f5e0a3"/>
    </linearGradient>
    <linearGradient id="goldLuster" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#451a03"/>
      <stop offset="50%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    
    <!-- Hologram Glassmorphism Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Classic Japanese Waves (Seigaiha) in background, very subtle -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1" fill="none">
    <path d="M-50,100 Q-25,75 0,100 T50,100 T100,100 T150,100 T200,100 T250,100 T300,100 T350,100 T400,100 T450,100 T500,100 T550,100 T600,100 T650,100 T700,100 T750,100 T800,100 T850,100" />
    <path d="M-25,120 Q0,95 25,120 T75,120 T125,120 T175,120 T225,120 T275,120 T325,120 T375,120 T425,120 T475,120 T525,120 T575,120 T625,120 T675,120 T725,120 T775,120 T825,120" />
    <path d="M-50,140 Q-25,115 0,140 T50,140 T100,140 T150,140 T200,140 T250,140 T300,140 T350,140 T400,140 T450,140 T500,140 T550,140 T600,140 T650,140 T700,140 T750,140 T800,140 T850,140" />
    
    <path d="M-50,450 Q-25,425 0,450 T50,450 T100,450 T150,450 T200,450 T250,450 T300,450 T350,450 T400,450 T450,450 T500,450 T550,450 T600,450 T650,450 T700,450 T750,450 T800,450 T850,450" />
    <path d="M-25,470 Q0,445 25,470 T75,470 T125,470 T175,470 T225,470 T275,470 T325,470 T375,470 T425,470 T475,470 T525,470 T575,470 T625,470 T675,470 T725,470 T775,470 T825,470" />
    <path d="M-50,490 Q-25,465 0,490 T50,490 T100,490 T150,490 T200,490 T250,490 T300,490 T350,490 T400,490 T450,490 T500,490 T550,490 T600,490 T650,490 T700,490 T750,490 T800,490 T850,490" />
  </g>

  <!-- Glowing vector/RAG connections in background -->
  <g opacity="0.4">
    <line x1="100" y1="200" x2="250" y2="150" stroke="#06b6d4" stroke-width="1" stroke-dasharray="2,4"/>
    <line x1="250" y1="150" x2="350" y2="220" stroke="#06b6d4" stroke-width="1"/>
    <line x1="100" y1="200" x2="180" y2="350" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="180" y1="350" x2="320" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="350" y1="220" x2="520" y2="120" stroke="#fbbf24" stroke-width="1.5" filter="url(#neonGlowCyan)"/>
    <line x1="520" y1="120" x2="680" y2="180" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="320" y1="400" x2="480" y2="460" stroke="#a855f7" stroke-width="1"/>
    <line x1="480" y1="460" x2="620" y2="380" stroke="#a855f7" stroke-width="1.5" filter="url(#neonGlowPurple)"/>
    <line x1="680" y1="180" x2="620" y2="380" stroke="#fbbf24" stroke-width="1"/>

    <!-- Nodes -->
    <circle cx="100" cy="200" r="4" fill="#06b6d4" filter="url(#neonGlowCyan)"/>
    <circle cx="250" cy="150" r="6" fill="#a855f7" filter="url(#neonGlowPurple)"/>
    <circle cx="350" cy="220" r="5" fill="#fbbf24"/>
    <circle cx="180" cy="350" r="4" fill="#06b6d4"/>
    <circle cx="320" cy="400" r="7" fill="#fbbf24" filter="url(#neonGlowCyan)"/>
    <circle cx="520" cy="120" r="5" fill="#a855f7" filter="url(#neonGlowPurple)"/>
    <circle cx="680" cy="180" r="4" fill="#06b6d4"/>
    <circle cx="480" cy="460" r="6" fill="#fbbf24"/>
    <circle cx="620" cy="380" r="8" fill="#06b6d4" filter="url(#neonGlowCyan)"/>
  </g>

  <!-- The Classical Scroll (Emaki) -->
  <g filter="url(#shadow)" transform="translate(40, 60)">
    <!-- Unrolled paper body -->
    <path d="M 120,240 Q 280,210 440,230 T 600,200 L 600,430 Q 440,460 280,440 T 120,470 Z" fill="url(#parchment)"/>

    <!-- Scroll backing paper (dark green or red edge visible) -->
    <path d="M 120,240 Q 280,210 440,230 T 600,200 L 600,208 Q 440,238 280,218 T 120,248 Z" fill="#881337"/>
    <path d="M 120,462 Q 280,432 440,452 T 600,422 L 600,430 Q 440,460 280,440 T 120,470 Z" fill="#881337"/>

    <!-- Inside Artwork / Painting on Scroll -->
    <g opacity="0.85">
      <!-- Classical Golden Clouds -->
      <path d="M 140,260 Q 200,240 240,270 T 320,280 L 320,290 T 240,280 T 140,280 Z" fill="url(#goldLuster)"/>
      <path d="M 450,380 Q 520,360 560,390 T 580,410 L 580,420 T 520,400 T 450,400 Z" fill="url(#goldLuster)"/>

      <!-- Japanese Style Mountains (Silhouette) -->
      <path d="M 280,430 L 330,340 L 370,390 L 440,320 L 510,420 L 480,430 L 400,410 Z" fill="#1e3a8a" opacity="0.3"/>
      <path d="M 220,440 L 290,360 L 340,420 L 390,350 L 470,430 Z" fill="#14532d" opacity="0.4"/>

      <!-- Minimalist Heian Noble Silhouette (Princess) -->
      <g transform="translate(180, 320) scale(0.9)">
        <!-- Kimono layers -->
        <path d="M 50,110 L 120,110 C 110,70 90,40 50,40 C 10,40 -10,70 -20,110 Z" fill="#9d174d"/>
        <path d="M 45,110 L 105,110 C 95,75 80,48 45,48 C 10,48 -5,75 -15,110 Z" fill="#701a75"/>
        <path d="M 40,110 L 90,110 C 80,80 70,55 40,55 C 10,55 0,80 -10,110 Z" fill="#fbcfe8"/>
        <!-- Face/Hair silhouette -->
        <path d="M 40,35 C 33,35 30,25 35,20 C 40,15 45,25 40,35 Z" fill="#fdf6e2"/>
        <path d="M 33,23 C 25,23 20,35 15,50 C 15,65 18,90 20,110 L 25,110 C 23,90 20,65 20,50 C 25,38 30,30 35,28 C 40,30 45,38 50,50 C 50,65 47,90 45,110 L 50,110 C 52,90 55,65 55,50 C 50,35 45,23 37,23 Z" fill="#020617"/>
        <!-- Fan (Sensu) in gold -->
        <path d="M 35,60 L 55,75 L 45,80 Z" fill="url(#goldLuster)"/>
      </g>

      <!-- Falling Cherry Blossom Petals -->
      <path d="M 240,290 C 235,290 230,295 233,300 C 236,305 244,305 245,300 C 246,295 245,290 240,290 Z" fill="#fda4af"/>
      <path d="M 380,310 C 375,310 370,315 373,320 C 376,325 384,325 385,320 C 386,315 385,310 380,310 Z" fill="#fda4af" transform="rotate(15 380 310)"/>
      <path d="M 420,280 C 415,280 410,285 413,290 C 416,295 424,295 425,290 C 426,285 425,280 420,280 Z" fill="#fda4af" transform="rotate(-20 420 280)"/>
      <path d="M 300,360 C 295,360 290,365 293,370 C 296,375 304,375 305,370 C 306,365 305,360 300,360 Z" fill="#fda4af"/>
    </g>

    <!-- Scroll Roll End Left -->
    <g transform="translate(100, 205)">
      <ellipse cx="10" cy="25" rx="15" ry="8" fill="url(#goldLuster)"/>
      <rect x="-5" y="25" width="30" height="250" fill="url(#woodGrad)"/>
      <ellipse cx="10" cy="275" rx="15" ry="8" fill="url(#goldLuster)"/>
      <line x1="10" y1="20" x2="10" y2="280" stroke="#1c1917" stroke-width="2"/>
    </g>
    
    <!-- Scroll Roll End Right -->
    <g transform="translate(590, 165)">
      <ellipse cx="10" cy="25" rx="15" ry="8" fill="url(#goldLuster)"/>
      <rect x="-5" y="25" width="30" height="250" fill="url(#woodGrad)"/>
      <ellipse cx="10" cy="275" rx="15" ry="8" fill="url(#goldLuster)"/>
      <line x1="10" y1="20" x2="10" y2="280" stroke="#1c1917" stroke-width="2"/>
    </g>
  </g>

  <!-- Futuristic Holographic Chat Card -->
  <g filter="url(#shadow)" transform="translate(380, 240)">
    <!-- Glassmorphic Card Background -->
    <rect width="360" height="260" rx="20" fill="url(#glassGrad)" stroke="url(#glassBorder)" stroke-width="2"/>
    
    <!-- Header of the chat card -->
    <rect x="20" y="20" width="40" height="40" rx="20" fill="#06b6d4" opacity="0.2"/>
    <path d="M 40,28 Q 40,40 28,40 Q 40,40 40,52 Q 40,40 52,40 Q 40,40 40,28 Z" fill="#22d3ee" filter="url(#neonGlowCyan)"/>
    
    <!-- Chat Card Decorative Bars -->
    <rect x="75" y="27" width="120" height="10" rx="5" fill="#e2e8f0" opacity="0.8"/>
    <rect x="75" y="44" width="70" height="6" rx="3" fill="#94a3b8" opacity="0.6"/>

    <!-- Horizontal divider -->
    <line x1="20" y1="75" x2="340" y2="75" stroke="#ffffff" stroke-width="1" opacity="0.15"/>

    <!-- Chat Message Bubble 1 (User / Query) -->
    <g transform="translate(100, 95)">
      <path d="M 10,0 L 220,0 C 230,0 240,10 240,20 L 240,40 C 240,50 230,60 220,60 L 30,60 C 20,60 10,50 10,40 L 10,20 Z" fill="#312e81" opacity="0.85" stroke="#4338ca" stroke-width="1"/>
      <path d="M 235,60 L 245,70 L 240,55 Z" fill="#312e81"/>
      <rect x="30" y="18" width="180" height="8" rx="4" fill="#a5b4fc" opacity="0.5"/>
      <rect x="30" y="34" width="130" height="8" rx="4" fill="#a5b4fc" opacity="0.5"/>
    </g>

    <!-- Glowing RAG Query Connection Stream -->
    <path d="M -80,140 Q 0,160 80,140" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5" filter="url(#neonGlowCyan)"/>
    <circle cx="80" cy="140" r="4" fill="#fbbf24" filter="url(#neonGlowCyan)"/>

    <!-- Chat Message Bubble 2 (AI response) -->
    <g transform="translate(20, 175)">
      <path d="M 10,0 L 220,0 C 230,0 240,10 240,20 L 240,50 C 240,60 230,70 220,70 L 30,70 C 20,70 10,60 10,50 L 10,20 Z" fill="#0f172a" opacity="0.85" stroke="#06b6d4" stroke-width="1.5" filter="url(#neonGlowCyan)"/>
      <path d="M 15,70 L 5,80 L 10,65 Z" fill="#0f172a"/>
      <rect x="30" y="18" width="180" height="7" rx="3.5" fill="#22d3ee" opacity="0.8"/>
      <rect x="30" y="32" width="190" height="7" rx="3.5" fill="#22d3ee" opacity="0.8"/>
      <rect x="30" y="46" width="120" height="7" rx="3.5" fill="#22d3ee" opacity="0.8"/>
    </g>
  </g>

  <!-- Small floating neon sparks/particles -->
  <g opacity="0.8">
    <circle cx="450" cy="180" r="2" fill="#fbbf24" filter="url(#neonGlowCyan)"/>
    <circle cx="380" cy="200" r="1.5" fill="#22d3ee"/>
    <circle cx="310" cy="250" r="2" fill="#a855f7" filter="url(#neonGlowPurple)"/>
    <circle cx="330" cy="480" r="1.5" fill="#fbbf24"/>
    <circle cx="690" cy="480" r="2" fill="#22d3ee" filter="url(#neonGlowCyan)"/>
    <circle cx="730" cy="180" r="2.5" fill="#a855f7"/>
  </g>
</svg>
